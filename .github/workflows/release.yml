name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted publishing (OIDC) requires a recent npm; upgrade before publishing.
      - run: npm install -g npm@latest
      - run: npm ci

      # Opens/updates a "Version Packages" PR, or publishes when that PR is merged.
      # Authentication is OIDC trusted publishing — no NPM_TOKEN needed. Configure
      # the trusted publisher in the package settings on npmjs.com.
      - uses: changesets/action@v1
        with:
          publish: npm run release
          version: npx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
